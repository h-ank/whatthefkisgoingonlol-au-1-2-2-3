name: Daily Digest Update

on:
  schedule:
    - cron: '0 19 * * *'  # 6:00 AM AEDT (UTC+11) / 5:00 AM AEST (UTC+10)
  workflow_dispatch:        # Allow manual trigger

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-digest.js

      - name: Commit and push updated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/digest.json
          git diff --staged --quiet || git commit -m "chore: update daily digest [skip ci]"
          git push
